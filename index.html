<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILTON TECH - Scanner Universal</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --azul: #0066FF; --verde: #00D26A; --bg: #0A0F1E; --card: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; padding: 20px; text-align: center; }
       .container { max-width: 600px; margin: 0 auto; }
       .logo { font-size: 32px; font-weight: 900; color: var(--azul); margin-bottom: 5px; }
       .logo span { color: var(--verde); }
       .subtitle { color: #9CA3AF; margin-bottom: 25px; font-size: 14px; }
        #reader { width: 100%; border: 3px solid var(--azul); border-radius: 16px; overflow: hidden; background: var(--card); margin: 20px 0; }
       .botoes { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
       .btn { background: var(--azul); color: white; border: none; padding: 14px 20px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
       .btn-stop { background: #EF4444; }
       .btn-galeria { background: var(--verde); }
        #resultado { margin-top: 20px; padding: 15px; background: var(--card); border-radius: 10px; border-left: 4px solid var(--verde); word-break: break-all; text-align: left; display: none; }
        #file-input { display: none; }
       .footer { margin-top: 40px; color: #6B7280; font-size: 12px; }
       .footer strong { color: var(--verde); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MILTON <span>TECH</span></div>
        <div class="subtitle">Scanner Universal - Lê e abre qualquer QR Code</div>
        <div id="reader"></div>
        <div class="botoes">
            <button id="start-btn" class="btn" onclick="iniciarScanner()"><i class="fa-solid fa-camera"></i> Iniciar Scanner</button>
            <button id="stop-btn" class="btn btn-stop" onclick="pararScanner()" style="display:none;"><i class="fa-solid fa-stop"></i> Parar</button>
            <button class="btn btn-galeria" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-image"></i> Ler da Galeria</button>
            <input type="file" id="file-input" accept="image/*" onchange="lerPorImagem(event)">
        </div>
        <div id="resultado"></div>
        <div class="footer">Desenvolvido por <strong>MILTON TECH</strong> | Luanda, Angola</div>
    </div>
    <script>
        let html5QrcodeScanner; let scannerRodando = false;
        function mostrarResultado(texto) { const div = document.getElementById('resultado'); div.style.display = 'block'; div.innerHTML = `<strong>Status:</strong><br>${texto}`; }
        function iniciarScanner() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'inline-flex';
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, () => {}).then(() => {
                scannerRodando = true; mostrarResultado('Aponte a câmera para o QR Code...');
            }).catch(err => { mostrarResultado(`Erro: ${err}`); pararScanner(); });
        }
        function pararScanner() {
            if (html5QrcodeScanner && scannerRodando) {
                html5QrcodeScanner.stop().then(() => {
                    scannerRodando = false;
                    document.getElementById('start-btn').style.display = 'inline-flex';
                    document.getElementById('stop-btn').style.display = 'none';
                    document.getElementById('reader').innerHTML = '';
                });
            }
        }
        function onScanSuccess(decodedText) {
            pararScanner();
            mostrarResultado(`Abrindo: ${decodedText}`);
            setTimeout(() => { window.location.href = decodedText; }, 500);
        }
        function lerPorImagem(e) {
            if (e.target.files.length == 0) return;
            const html5QrCode = new Html5Qrcode("reader");
            mostrarResultado('Analisando imagem...');
            html5QrCode.scanFile(e.target.files[0], true).then(decodedText => {
                onScanSuccess(decodedText);
            }).catch(err => { mostrarResultado(`Erro: QR não encontrado na imagem`); });
        }
    </script>
</body>
</html>
