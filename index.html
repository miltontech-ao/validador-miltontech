<!DOCTYPE html><html><head><base target="_top"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://unpkg.com/html5-qrcode"></script><style>body{font-family:Arial,sans-serif;text-align:center;background:#121212;color:white;margin:0;padding:20px}#reader{width:100%;max-width:500px;margin:20px auto;border-radius:12px}.resultado{padding:30px;margin-top:20px;border-radius:12px;font-size:20px;font-weight:bold}.verde{background:#1DB954}.vermelho{background:#E50914}button{background:#1DB954;color:white;border:none;padding:15px 25px;font-size:16px;border-radius:8px;margin:10px 5px}.btn-imagem{background:#333}input[type=file]{display:none}</style></head><body><h1>MILTON TECH</h1><h3>Validador de Cartão</h3><div id="reader"></div><div id="resultado"></div><button onclick="iniciarCamera()">📷 ESCANEAR COM CÂMERA</button><button class="btn-imagem" onclick="document.getElementById('input-imagem').click()">🖼️ LER DE IMAGEM</button><input type="file" id="input-imagem" accept="image/*" onchange="lerImagem(event)"><script>let html5QrCode;function iniciarCamera(){document.getElementById('resultado').innerHTML='';html5QrCode=new Html5Qrcode("reader");html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},onScanSuccess,onScanError)}function lerImagem(event){if(event.target.files.length==0)return;document.getElementById('resultado').innerHTML='<p>Lendo imagem...</p>';const imageFile=event.target.files[0];const html5QrCode=new Html5Qrcode("reader");html5QrCode.scanFile(imageFile,true).then(onScanSuccess).catch(err=>{document.getElementById('resultado').className='resultado vermelho';document.getElementById('resultado').innerHTML=`❌ ERRO<br><br>Não achei QR na imagem.`;});}function onScanSuccess(textoDoQR){if(html5QrCode&&html5QrCode.getState()==2){html5QrCode.stop();}document.getElementById('resultado').innerHTML='<p>Verificando...</p>';google.script.run.withSuccessHandler(mostrarResultado).buscarCliente(textoDoQR);}function onScanError(error){}function mostrarResultado(res){const div=document.getElementById('resultado');if(res.valido){div.className='resultado verde';div.innerHTML=`✅ CARTÃO VÁLIDO<br><br>Nome: ${res.nome}<br>Código: ${res.codigo}<br>Status: ${res.status}`;}else{div.className='resultado vermelho';div.innerHTML=`❌ CARTÃO INVÁLIDO<br><br>${res.motivo}`;}}</script></body></html>
