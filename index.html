<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d47a1">
    <title>Milton Tech - Validador PFS 5.4</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #0a1929; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        .header { 
            background: #0d47a1; 
            padding: 20px; 
            text-align: center; 
        }
        .header img { 
            width: 80px; 
            height: 80px; 
            display: block; 
            margin: 0 auto 10px; 
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .content { 
            flex: 1; 
            padding: 20px; 
            text-align: center; 
        }
        #scanner { 
            width: 100%; 
            max-width: 400px; 
            height: 300px; 
            margin: 20px auto; 
            background: #000; 
            border-radius: 8px; 
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            margin: 10px;
        }
        .nav { 
            display: flex; 
            background: #0d1b2a; 
            border-top: 1px solid #1e3a5f; 
        }
        .nav-item { 
            flex: 1; 
            padding: 15px 5px; 
            text-align: center; 
            font-size: 12px; 
            color: #90a4ae; 
        }
        .nav-item.active { color: #42a5f5; }
    </style>
</head>
<body>
    <div class="header">
        <img src="./icon-192.png" alt="Logo Milton Tech">
        <h1>MILTON TECH</h1>
        <p>Validador PFS 5.4 - Lista Direta</p>
    </div>

    <div class="content" id="home">
        <h2>Bem-vindo</h2>
        <p>Sistema offline pronto para validar cartões PFS.</p>
        <button onclick="abrirScanner()">Abrir Scanner</button>
        <div id="scanner"></div>
        <p id="resultado"></p>
    </div>

    <div class="nav">
        <div class="nav-item active">🏠<br>Início</div>
        <div class="nav-item" onclick="abrirScanner()">📱<br>Scanner</div>
        <div class="nav-item">👥<br>Clientes</div>
        <div class="nav-item">⚙️<br>Config</div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        // Registra Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        let html5QrcodeScanner;

        function abrirScanner() {
            document.getElementById('resultado').innerText = 'Ligando câmera...';
            html5QrcodeScanner = new Html5QrcodeScanner(
                "scanner", 
                { fps: 10, qrbox: 250 },
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('resultado').innerText = `Código: ${decodedText}`;
            html5QrcodeScanner.clear();
        }

        function onScanError(error) {
            // Ignora erros de leitura
        }
    </script>
</body>
</html>
