<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Validador Milton Tech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial; background:#0d1b2a; color:white; text-align:center; }
    #header { background:#1b263b; padding:18px; font-weight:bold; font-size:20px; }
    #reader { width:100%; max-width:500px; margin:20px auto; }
    #status { padding:25px; font-size:16px; color:#e0e1dd; }
    #footer { position:fixed; bottom:10px; width:100%; font-size:12px; color:#778da9; }
  </style>
</head>
<body>
  <div id="header">MILTON TECH - VALIDADOR OFICIAL</div>
  <div id="reader"></div>
  <div id="status">Aponte a câmera para o QR Code do ingresso</div>
  <div id="footer">Sistema Validador v1.0</div>

  <script>
    function onScanSuccess(decodedText) {
      document.getElementById('status').innerText = 'INGRESSO VÁLIDO: ' + decodedText;
      document.getElementById('status').style.color = '#2ecc71';
    }
    function onScanFailure(error) {
      // ignora erro
    }
    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
