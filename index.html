<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILTON TECH - Validador Offline</title>
    <meta name="theme-color" content="#0d47a1">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --azul: #0d47a1; --verde: #00c853; --vermelho: #d32f2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial; background: #0a1929; color: #e3f2fd; }
   .header { background: var(--azul); padding: 20px 15px; text-align: center; }
   .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        #reader { width: 100%; margin: 15px auto; border-radius: 16px; overflow: hidden; border: 3px solid #1565c0; }
  .card { background: #132f4c; padding: 20px; border-radius: 16px; margin-top: 16px; border: 1px solid #1e4976; }
  .ativo { box-shadow: 0 0 0 3px var(--verde) inset; }
  .bloqueado { box-shadow: 0 0 0 3px var(--vermelho) inset; }
  .status { font-size: 28px; font-weight: 900; margin: 15px 0; text-align: center; }
  .verde { color: #4caf50; }
  .vermelho { color: #f44336; }
        button { width: 100%; padding: 16px; font-size: 16px; background: var(--azul); color: white; border: none; border-radius: 12px; margin-top: 12px; font-weight: 700; }
  .btn-sec { background: #1e4976; }
  .info { font-size: 15px; line-height: 1.8; color: #bbdefb; }
  .info strong { color: white; }
  .badge-offline { background: #ff9800; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="header"><h1>MILTON TECH</h1><p>Validador PFS</p></div>
    <div class="container">
        <div id="reader"></div>
        <div id="resultado"></div>
        <button onclick="iniciarLeitor()">📷 ESCANEAR</button>
        <button class="btn-sec" onclick="sincronizar()">🔄 SINCRONIZAR DADOS</button>
    </div>

<script>
const URL_PLANILHA_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQANUa7iBeRexdi51FuLHzPgG5LP5CgY8SKSXYWAvcNbL6Mu1UbieDsrDQlQRcc5UDPfkVv4ZHqOIfx/pub?output=csv";
let html5QrCode, scannerRodando = false;
let dadosPlanilha = [];

// 1. CARREGA CACHE PRIMEIRO, DEPOIS TENTA ONLINE
function carregarDados() {
    const cache = localStorage.getItem('planilhaPFS');
    const ultimaSync = localStorage.getItem('ultimaSync');

    if(cache) {
        dadosPlanilha = JSON.parse(cache);
        document.getElementById("resultado").innerHTML = `
            <div class="card">
                <span class="badge-offline">MODO OFFLINE</span>
                <p><strong>${dadosPlanilha.length} clientes carregados</strong></p>
                <p><small>Última sync: ${ultimaSync || 'Nunca'}</small></p>
                <p>Pronto pra escanear sem internet</p>
            </div>`;
    } else {
        document.getElementById("resultado").innerHTML = `
            <div class="card">
                <h3>Primeira vez?</h3>
                <p>Liga a internet e clica em "Sincronizar Dados"</p>
            </div>`;
    }
}

// 2. SINCRONIZA QUANDO TIVER NET
async function sincronizar() {
    document.getElementById("resultado").innerHTML = `<div class="card">Baixando dados...</div>`;
    try {
        const resposta = await fetch(URL_PLANILHA_CSV);
        if(!resposta.ok) throw new Error('Erro na planilha');
        const csv = await resposta.text();
        const linhas = csv.split("\n").slice(1);
        dadosPlanilha = linhas.filter(l => l.trim()).map(linha => {
            const col = linha.split(",");
            return {
                nome: col[0]?.trim(), codigo: col[1]?.trim(),
                dataInicio: col[2]?.trim(), dataFim: col[3]?.trim(),
                status: col[4]?.trim(), foto: col[5]?.trim(), telefone: col[6]?.trim()
            };
        });
        localStorage.setItem('planilhaPFS', JSON.stringify(dadosPlanilha));
        localStorage.setItem('ultimaSync', new Date().toLocaleString('pt-AO'));
        document.getElementById("resultado").innerHTML = `
            <div class="card">
                <h3>✅ Sincronizado</h3>
                <p>${dadosPlanilha.length} clientes salvos no celular</p>
                <p>Agora funciona offline</p>
            </div>`;
    } catch (e) {
        document.getElementById("resultado").innerHTML = `
            <div class="card">
                <h3>❌ Sem Internet</h3>
                <p>Não consegui baixar. Verifica a rede e tenta de novo.</p>
            </div>`;
    }
}

function verificarStatusPFS(dataFim) {
    if(!dataFim) return "BLOQUEADO";
    try {
        const partes = dataFim.split(" ");
        const data = partes[0].split("/");
        const hora = partes[1] || "23:59";
        const dataFormatada = `${data[2]}-${data[1]}-${data[0]}T${hora}:00`;
        return new Date() > new Date(dataFormatada)? "BLOQUEADO" : "ATIVO";
    } catch { return "BLOQUEADO"; }
}

function mostrarResultado(texto) {
    const cliente = dadosPlanilha.find(c => c.codigo === texto.trim());
    if (cliente) {
        const status = verificarStatusPFS(cliente.dataFim);
        const classe = status === "ATIVO"? "ativo" : "bloqueado";
        const cor = status === "ATIVO"? "verde" : "vermelho";
        document.getElementById("resultado").innerHTML = `
            <div class="card ${classe}">
                <h2>${cliente.nome}</h2>
                <div class="info">
                    <p><strong>Código:</strong> ${cliente.codigo}</p>
                    <p><strong>Data Inicial:</strong> ${cliente.dataInicio || '-'}</p>
                    <p><strong>Data Final:</strong> ${cliente.dataFim}</p>
                </div>
                <p class="status ${cor}">${status}</p>
                <button onclick="iniciarLeitor()">NOVA LEITURA</button>
            </div>`;
    } else {
        document.getElementById("resultado").innerHTML = `
            <div class="card"><h3>Código não encontrado</h3><p>${texto}</p></div>`;
    }
}

function onScanSuccess(texto) { pararLeitor(); mostrarResultado(texto); }

async function iniciarLeitor() {
    if(scannerRodando) await pararLeitor();
    document.getElementById("resultado").innerHTML = "";
    html5QrCode = new Html5Qrcode("reader");
    try {
        await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
        scannerRodando = true;
    } catch (err) {
        document.getElementById("resultado").innerHTML = `<div class="card">Erro na câmera</div>`;
    }
}
async function pararLeitor() {
    if(html5QrCode && scannerRodando) { await html5QrCode.stop(); scannerRodando = false; }
}

carregarDados(); // Carrega o cache assim que abre
</script>
</body>
</html>
