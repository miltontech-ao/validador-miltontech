<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILTON TECH - Scanner Universal</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --azul-milton: #0066FF;
            --verde-milton: #00D26A;
            --bg-dark: #0A0F1E;
            --bg-card: #111827;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
       .container {
            max-width: 600px;
            margin: 0 auto;
        }
       .logo {
            font-size: 32px;
            font-weight: 900;
            color: var(--azul-milton);
            margin-bottom: 5px;
        }
       .logo span { color: var(--verde-milton); }
       .subtitle {
            color: #9CA3AF;
            margin-bottom: 25px;
            font-size: 14px;
        }
        #reader {
            width: 100%;
            border: 3px solid var(--azul-milton);
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-card);
            margin: 20px 0;
        }
      .botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
      .btn {
            background: var(--azul-milton);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
      .btn:hover { opacity: 0.9; transform: translateY(-2px); }
      .btn-stop { background: #EF4444; }
      .btn-galeria { background: var(--verde-milton); }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 10px;
            border-left: 4px solid var(--verde-milton);
            word-break: break-all;
            text-align: left;
            display: none;
        }
        #file-input { display: none; }
      .footer {
            margin-top: 40px;
            color: #6B7280;
            font-size: 12px;
        }
      .footer strong { color: var(--verde-milton); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MILTON <span>TECH</span></div>
        <div class="subtitle">Scanner Universal - Lê e abre qualquer QR Code</div>

        <div id="reader"></div>

        <div class="botoes">
            <button id="start-btn" class="btn" onclick="iniciarScanner()">
                <i class="fa-solid fa-camera"></i> Iniciar Scanner
            </button>
            <button id="stop-btn" class="btn btn-stop" onclick="pararScanner()" style="display:none;">
                <i class="fa-solid fa-stop"></i> Parar
            </button>
            <button class="btn btn-galeria" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-image"></i> Ler da Galeria
            </button>
            <input type="file" id="file-input" accept="image/*" onchange="lerPorImagem(event)">
        </div>

        <div id="resultado"></div>

        <div class="footer">
            Desenvolvido por <strong>MILTON TECH</strong> | Luanda, Angola
        </div>
    </div>

    <script>
        let html5QrcodeScanner;
        let scannerRodando = false;

        function mostrarResultado(texto) {
            const div = document.getElementById('resultado');
            div.style.display = 'block';
            div.innerHTML = `<strong>QR Lido:</strong><br>${texto}`;
        }

        function iniciarScanner() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'inline-flex';
            document.getElementById('resultado').style.display = 'none';

            html5QrcodeScanner = new Html5Qrcode("reader");

            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            html5QrcodeScanner.start(
                { facingMode: "environment" }, // Câmera traseira por padrão
                config,
                onScanSuccess,
                onScanFailure
            ).then(() => {
                scannerRodando = true;
                mostrarResultado('Aponte a câmera para o QR Code...');
            }).catch(err => {
                mostrarResultado(`Erro ao iniciar câmera: ${err}`);
                pararScanner();
            });
        }

        function pararScanner() {
            if (html5QrcodeScanner && scannerRodando) {
                html5QrcodeScanner.stop().then(() => {
                    scannerRodando = false;
                    document.getElementById('start-btn').style.display = 'inline-flex';
                    document.getElementById('stop-btn').style.display = 'none';
                    document.getElementById('reader').innerHTML = '';
                    mostrarResultado('Scanner parado. Toque em "Iniciar Scanner" para ler novamente.');
                }).catch(err => console.log('Erro ao parar:', err));
            }
        }

        // FUNÇÃO PRINCIPAL: ABRE QUALQUER COISA
        function onScanSuccess(decodedText, decodedResult) {
            pararScanner();
            mostrarResultado(`Redirecionando...`);

            // Se for link, abre direto. Se não for, tenta abrir mesmo assim.
            // Facebook, Instagram, Planilha, YouTube, WhatsApp, Pix, qualquer coisa.
            setTimeout(() => {
                window.location.href = decodedText;
            }, 500);
        }

        function onScanFailure(error) {
            // Ignora erro de "QR não encontrado"
        }

        // Ler QR por imagem
        function lerPorImagem(e) {
            if (e.target.files.length == 0) return;

            const imageFile = e.target.files[0];
            const html5QrCode = new Html5Qrcode("reader");

            mostrarResultado('Analisando imagem...');

            html5QrCode.scanFile(imageFile, true)
          .then(decodedText => {
                onScanSuccess(decodedText);
            })
          .catch(err => {
                mostrarResultado(`Erro: Não encontrei QR Code nessa imagem. ${err}`);
            });
        }
    </script>
</body>
          </html>
