<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Completo PFS</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
   .aba {
      display: inline-block;
      padding: 12px 24px;
      background: #1e1e1e;
      margin: 5px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-weight: bold;
    }
   .aba.ativo {
      background: #00d4aa;
      color: #000;
    }
   .conteudo {
      display: none;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      margin: 0 auto;
    }
   .conteudo.ativo {
      display: block;
    }
    #reader, #qrcode {
      width: 100%;
      max-width: 350px;
      margin: 20px auto;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
    }
    #reader {
      border: 2px solid #00d4aa;
      padding: 0;
    }
    input {
      width: 90%;
      max-width: 400px;
      padding: 12px;
      border-radius: 6px;
      border: 2px solid #00d4aa;
      background: #111;
      color: #fff;
      font-size: 16px;
      margin: 10px 0;
    }
    button {
      background: #00d4aa;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      margin: 8px;
      cursor: pointer;
    }
   .btn-sec {
      background: #2563eb;
      color: #fff;
    }
   .btn-off {
      background: #ef4444;
      color: #fff;
    }
    #result {
      margin-top: 15px;
      padding: 15px;
      background: #111;
      border-radius: 8px;
      word-break: break-all;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>⚡ QR Completo PFS</h2>

  <div class="aba ativo" onclick="trocarAba('gerar')">Gerar QR</div>
  <div class="aba" onclick="trocarAba('ler')">Ler QR</div>

  <!-- ABA GERAR -->
  <div id="gerar" class="conteudo ativo">
    <h3>Gerar QR Code</h3>
    <input type="text" id="texto" placeholder="Digita: PFS-9A8B7C6D" value="PFS-9A8B7C6D">
    <br>
    <button onclick="gerarQR()">Gerar</button>
    <button class="btn-sec" onclick="baixarQR()">Baixar PNG</button>
    <button class="btn-sec" onclick="copiarTexto()">Copiar Texto</button>
    <div id="qrcode"></div>
  </div>

  <!-- ABA LER -->
  <div id="ler" class="conteudo">
    <h3>Ler QR Code</h3>
    <div id="reader"></div>
    <button onclick="iniciarCamera()">Ligar Câmera</button>
    <button class="btn-off" onclick="pararCamera()">Parar</button>
    <p>OU</p>
    <input type="file" id="qr-input-file" accept="image/*">
    <div id="result">Aguardando leitura...</div>
  </div>

  <script>
    let html5QrCode;
    let cameraLigada = false;

    // TROCAR ABA
    function trocarAba(aba) {
      document.querySelectorAll('.aba').forEach(el => el.classList.remove('ativo'));
      document.querySelectorAll('.conteudo').forEach(el => el.classList.remove('ativo'));
      event.target.classList.add('ativo');
      document.getElementById(aba).classList.add('ativo');
      if (aba === 'ler' &&!cameraLigada) iniciarCamera();
      if (aba === 'gerar') pararCamera();
    }

    // GERADOR
    function gerarQR() {
      const texto = document.getElementById('texto').value;
      const divQR = document.getElementById('qrcode');
      if (!texto) return alert('Digita alguma coisa!');
      divQR.innerHTML = '';
      new QRCode(divQR, {
        text: texto,
        width: 280,
        height: 280,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function baixarQR() {
      const img = document.querySelector('#qrcode img');
      if (!img) return alert('Gera o QR primeiro!');
      const link = document.createElement('a');
      link.href = img.src;
      link.download = document.getElementById('texto').value + '.png';
      link.click();
    }

    function copiarTexto() {
      navigator.clipboard.writeText(document.getElementById('texto').value);
      alert('Texto copiado!');
    }

    // LEITOR
    function mostrarResultado(texto) {
      document.getElementById('result').innerHTML = `<strong>✅ Leu:</strong><br>${texto}`;
    }

    function iniciarCamera() {
      if (cameraLigada) return;
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => mostrarResultado(decodedText),
        () => {}
      ).then(() => {
        cameraLigada = true;
        document.getElementById('result').innerHTML = 'Câmera ligada. Aponta pro QR...';
      }).catch(err => {
        document.getElementById('result').innerHTML = `❌ Erro: ${err}`;
      });
    }

    function pararCamera() {
      if (html5QrCode && cameraLigada) {
        html5QrCode.stop().then(() => {
          cameraLigada = false;
          document.getElementById('reader').innerHTML = '';
        });
      }
    }

    // Ler de imagem
    document.getElementById('qr-input-file').addEventListener('change', e => {
      if (e.target.files.length == 0) return;
      const html5QrCodeFile = new Html5Qrcode("reader");
      html5QrCodeFile.scanFile(e.target.files[0], true)
       .then(decodedText => mostrarResultado(decodedText))
       .catch(err => document.getElementById('result').innerHTML = `❌ Não achei QR: ${err}`);
    });

    // Inicia gerando
    gerarQR();
  </script>
</body>
      </html>
